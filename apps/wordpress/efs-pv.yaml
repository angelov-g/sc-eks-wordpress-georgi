apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-pv
  namespace: wordpress
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-0c27522713de3abb1 
