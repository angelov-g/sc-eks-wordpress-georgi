apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordpress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: wordpress
      targetRevision: 29.2.8
      helm:
        valueFiles:
          - $repo-root/apps/wordpress/values.yaml
    - repoURL: https://github.com/angelov-g/sc-eks-wordpress-georgi.git
      targetRevision: HEAD
      ref: repo-root
  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
